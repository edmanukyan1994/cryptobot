services:
  postgres:
    image: postgres:16-alpine
    container_name: cryptobot_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: cryptobot
      POSTGRES_USER: cryptobot
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cryptobot"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build: ./bot
    container_name: cryptobot_engine
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://cryptobot:${DB_PASSWORD}@postgres:5432/cryptobot
    volumes:
      - ./bot:/app

volumes:
  postgres_data:
