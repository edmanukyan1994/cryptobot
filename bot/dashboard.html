<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoBot Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e8e8e8; min-height: 100vh; }
  .wrap { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
  header h1 { font-size: 20px; font-weight: 500; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; display: inline-block; margin-right: 8px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .refresh { font-size: 12px; color: #888; cursor: pointer; padding: 6px 12px; border: 1px solid #333; border-radius: 8px; background: transparent; color: #ccc; }
  .refresh:hover { background: #1a1a1a; }
  .grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1.5rem; }
  .grid2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 1rem; }
  .metric { background: #1a1a1a; border-radius: 10px; padding: 1rem; border: 1px solid #2a2a2a; }
  .metric-label { font-size: 12px; color: #888; margin-bottom: 6px; }
  .metric-value { font-size: 24px; font-weight: 500; }
  .pos { color: #22c55e; }
  .neg { color: #ef4444; }
  .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
  .card-title { font-size: 14px; font-weight: 500; color: #ccc; margin-bottom: 1rem; }
  .trade-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #2a2a2a; font-size: 13px; }
  .trade-row:last-child { border-bottom: none; }
  .badge { padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 500; }
  .badge-short { background: #3f1515; color: #ef4444; }
  .badge-long { background: #0f2a1a; color: #22c55e; }
  .symbol { font-weight: 500; min-width: 70px; color: #fff; }
  .muted { color: #888; flex: 1; font-size: 12px; }
  .fg-bar { height: 4px; border-radius: 2px; background: #2a2a2a; margin-top: 8px; }
  .fg-fill { height: 100%; border-radius: 2px; }
  .loading { color: #888; font-size: 13px; text-align: center; padding: 2rem; }
  .err { color: #ef4444; font-size: 13px; }
  @media(max-width:600px) { .grid4{grid-template-columns:repeat(2,1fr)} .grid2{grid-template-columns:1fr} }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1><span class="dot" id="dot"></span>CryptoBot</h1>
    <div style="display:flex;align-items:center;gap:12px">
      <span id="last-update" style="font-size:12px;color:#888"></span>
      <button class="refresh" onclick="loadAll()">Обновить</button>
    </div>
  </header>

  <div class="grid4">
    <div class="metric"><div class="metric-label">Баланс</div><div class="metric-value" id="balance">—</div></div>
    <div class="metric"><div class="metric-label">PnL</div><div class="metric-value" id="pnl">—</div></div>
    <div class="metric"><div class="metric-label">Позиций открыто</div><div class="metric-value" id="open-cnt">—</div><div style="font-size:12px;color:#888;margin-top:4px" id="closed-cnt"></div></div>
    <div class="metric"><div class="metric-label">Fear & Greed</div><div class="metric-value" id="fg-val">—</div><div class="fg-bar"><div class="fg-fill" id="fg-bar" style="width:0%"></div></div></div>
  </div>

  <div class="card">
    <div class="card-title">График баланса</div>
    <canvas id="chart" height="160"></canvas>
  </div>

  <div class="grid2">
    <div class="card">
      <div class="card-title">Открытые позиции</div>
      <div id="positions"><div class="loading">Загрузка...</div></div>
    </div>
    <div class="card">
      <div class="card-title">Статистика</div>
      <div id="stats"><div class="loading">Загрузка...</div></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Последние сделки</div>
    <div id="trades"><div class="loading">Загрузка...</div></div>
  </div>
</div>

<script>
const API = 'https://cryptobot-production-bad6.up.railway.app';
let chart = null;

const fmt = n => new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(n);
const fmtP = n => (n>=0?'+':'')+n.toFixed(2)+'%';
const fmtS = n => (n>=0?'+':'')+fmt(n);

async function loadStatus() {
  try {
    const d = await fetch(API+'/api/status').then(r=>r.json());
    document.getElementById('dot').style.background = '#22c55e';
    document.getElementById('balance').textContent = fmt(d.balance);
    const pEl = document.getElementById('pnl');
    pEl.textContent = fmtS(d.pnl) + ' (' + fmtP(d.pnl/d.initial_balance*100) + ')';
    pEl.className = 'metric-value ' + (d.pnl>=0?'pos':'neg');
    document.getElementById('open-cnt').textContent = d.open_trades;
    document.getElementById('closed-cnt').textContent = 'Закрытых: ' + d.closed_trades;
    if (d.fear_greed) {
      const fg = d.fear_greed.value;
      document.getElementById('fg-val').textContent = fg + ' · ' + d.fear_greed.label;
      const bar = document.getElementById('fg-bar');
      bar.style.width = fg + '%';
      bar.style.background = fg<25?'#ef4444':fg<45?'#f97316':fg<55?'#eab308':'#22c55e';
    }
    document.getElementById('last-update').textContent = 'Обновлено: ' + new Date().toLocaleTimeString('ru');
  } catch(e) {
    document.getElementById('dot').style.background = '#ef4444';
    document.getElementById('balance').innerHTML = '<span class="err">API недоступен</span>';
  }
}

async function loadPositions() {
  try {
    const data = await fetch(API+'/api/positions').then(r=>r.json());
    const el = document.getElementById('positions');
    if (!data.length) { el.innerHTML = '<div class="loading">Нет открытых позиций</div>'; return; }
    el.innerHTML = data.map(t=>`
      <div class="trade-row">
        <span class="badge badge-${t.direction}">${t.direction.toUpperCase()}</span>
        <span class="symbol">${t.symbol}</span>
        <span class="muted">${fmt(t.size)}</span>
        <span class="${t.pnl>=0?'pos':'neg'}">${fmtS(t.pnl)}</span>
        <span style="font-size:11px;color:#888;min-width:50px;text-align:right">${fmtP(t.pnl_pct)}</span>
      </div>`).join('');
  } catch(e) {}
}

async function loadStats() {
  try {
    const d = await fetch(API+'/api/stats').then(r=>r.json());
    const el = document.getElementById('stats');
    if (!d.total) { el.innerHTML = '<div class="loading">Нет сделок</div>'; return; }
    el.innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem">
        <div class="metric"><div class="metric-label">Win Rate</div><div class="metric-value pos" style="font-size:20px">${d.win_rate}%</div></div>
        <div class="metric"><div class="metric-label">Сделок</div><div class="metric-value" style="font-size:20px">${d.wins}✓ ${d.losses}✗</div></div>
        <div class="metric"><div class="metric-label">Ср. прибыль</div><div class="metric-value pos" style="font-size:16px">${fmtS(d.avg_win)}</div></div>
        <div class="metric"><div class="metric-label">Ср. убыток</div><div class="metric-value neg" style="font-size:16px">${fmtS(d.avg_loss)}</div></div>
      </div>
      <div style="font-size:12px;color:#888;margin-bottom:8px">По типу выхода:</div>
      ${d.by_reason.slice(0,6).map(r=>`
        <div class="trade-row">
          <span class="muted">${r.reason||'?'}</span>
          <span style="font-size:12px;color:#888">${r.count}x</span>
          <span style="font-size:12px;margin-left:8px" class="${r.pnl>=0?'pos':'neg'}">${fmtS(r.pnl)}</span>
        </div>`).join('')}`;
  } catch(e) {}
}

async function loadChart() {
  try {
    const data = await fetch(API+'/api/balance_history').then(r=>r.json());
    if (!data.length) return;
    const ctx = document.getElementById('chart').getContext('2d');
    if (chart) chart.destroy();
    chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: data.map(d => new Date(d.time).toLocaleDateString('ru',{month:'short',day:'numeric'})),
        datasets: [{
          data: data.map(d=>d.balance),
          borderColor: '#22c55e',
          backgroundColor: 'rgba(34,197,94,0.08)',
          borderWidth: 1.5, fill: true, tension: 0.3, pointRadius: 0
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid:{display:false}, ticks:{maxTicksLimit:8,font:{size:11},color:'#666'} },
          y: { grid:{color:'rgba(255,255,255,0.05)'}, ticks:{font:{size:11},color:'#666',callback:v=>'$'+(v/1000000).toFixed(3)+'M'} }
        }
      }
    });
  } catch(e) {}
}

async function loadTrades() {
  try {
    const data = await fetch(API+'/api/trades?limit=30').then(r=>r.json());
    const el = document.getElementById('trades');
    if (!data.length) { el.innerHTML = '<div class="loading">Нет сделок</div>'; return; }
    el.innerHTML = data.map(t=>`
      <div class="trade-row">
        <span class="badge badge-${t.direction}">${t.direction.toUpperCase()}</span>
        <span class="symbol">${t.symbol}</span>
        <span class="muted">${t.close_reason||'?'}</span>
        <span class="${t.pnl>=0?'pos':'neg'}">${fmtS(t.pnl)}</span>
        <span style="font-size:11px;color:#888;min-width:50px;text-align:right">${fmtP(t.pnl_pct)}</span>
      </div>`).join('');
  } catch(e) {}
}

async function loadAll() {
  await Promise.all([loadStatus(),loadPositions(),loadStats(),loadChart(),loadTrades()]);
}

loadAll();
setInterval(loadAll, 30000);
</script>
</body>
</html>
